<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <script type="text/javascript" th:src="@{/js/parameter.js}"></script>
</head>
<body>

<h3 th:class=hedersInCenter>Model Parameter</h3>

<table class="table table-bordered border-primary table-date">
    <tr style="background-color:dodgerblue;text-align:center">
        <td>Id</td>
        <td>Date</td>
        <td>Parameter</td>
        <td>CodParameter</td>
        <td>LastUpdate</td>
        <td>Meaning</td>
    </tr>
    <tr th:each="model : ${Models}">
        <td style="text-align:center"><p th:text="${model.id}"></p></td>
        <td style="text-align:center"><p th:text="${model.datetime}"></p></td>
        <td style="text-align:center"><p th:text="${model.parameter}"></p></td>
        <td style="text-align:center"><p th:text="${model.codParameter}"></p></td>
        <td style="text-align:center"><p th:text="${model.lastUpdate}"></p></td>
        <td style="text-align:center"><p th:text="${model.meaning}"></p></td>
    </tr>
</table>
