<!DOCTYPE html>
<!--<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">-->
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/controllerIndexCss.css}" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <script type="text/javascript" th:src="@{/js/parameter.js}"></script>
</head>
<body>


<div class="container">

    <div style="position: relative">
        <a href="/account/logOut" class="login-logout-css">logout</a>

        <br><br>

        <img class="img-icon-login-css login-logout-css" th:src="@{/images/user-login-icon.png}"/>

        <br><br>

        <a href="#" class="login-logout-css">login</a>

    </div>

    <h3 class=headers-in-center>Model Parameter</h3>

    <table class="table-date">
        <thead>
        <tr>
            <th>Id</th>
            <th>Date</th>
            <th>Parameter</th>
            <th>CodParameter</th>
            <th>LastUpdate</th>
            <th>Meaning</th>
            <th>*</th>
            <th>**</th>
        </tr>
        </thead>
        <tr th:each="model : ${Models}">
            <td><p th:text="${model.id}"></p></td>
            <td><p th:text="${model.datetime}"></p></td>
            <td><p th:text="${model.parameter}"></p></td>
            <td><p th:text="${model.codParameter}"></p></td>
            <td><p th:text="${model.lastUpdate}"></p></td>
            <td><p th:text="${model.meaning}"></p></td>
            <td><p th:text="aaa"></p></td>
            <td><p th:text="bbb"></p></td>
        </tr>
    </table>

</div>

<!--<button type="button" th:onclick="showAlert()">Show Alert</button>-->

</body>
</html>
